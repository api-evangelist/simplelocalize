specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: SimpleLocalize
providerId: simplelocalize
publisherName: SimpleLocalize
serviceCategory: Localization / Translation Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Localization
  - Translation
  - Internationalization
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for SimpleLocalize: tiered EUR-denominated subscription with plan
  caps on translation keys, seats, and auto-translation characters; enterprise plans negotiated.'
sources:
  - https://simplelocalize.io/pricing/
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: SimpleLocalize
  ServiceCategory: Localization / Translation Management
  ProviderName: SimpleLocalize
  PublisherName: SimpleLocalize
  InvoiceIssuerName: SimpleLocalize
  BillingCurrency: EUR
  ChargeCategory: Usage
meters:
  - name: subscription_month
    description: Monthly subscription fee for the selected plan tier (Developer, Team, Business).
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: translation_keys
    description: Active translation keys counted against the plan cap.
    unit: varies
    aggregation: max
    dimensions:
      - plan
      - project
  - name: auto_translation_characters
    description: Machine-translation characters consumed against initial allowance plus monthly top-up.
    unit: varies
    aggregation: sum
    dimensions:
      - plan
      - language_pair
  - name: team_seats
    description: Team-member seats provisioned against the plan cap.
    unit: seat
    aggregation: max
    dimensions:
      - plan
principles:
  - name: Visibility
    description: Track translation-key utilization and auto-translation character burn against plan
      caps via the SimpleLocalize dashboard; alert before keys, seats, or character pool exhaust.
  - name: Allocation
    description: Allocate cost per project (each project maps to a product or customer locale set)
      and per team member where seat economics matter.
  - name: Optimization
    description: Audit unused translation keys and stale languages to stay within tier caps; batch
      auto-translation runs to make best use of the rolling character pool before paying for higher
      tiers.
  - name: Accountability
    description: Localization owner reviews monthly key/seat/character utilization and approves tier
      upgrades or downgrades based on observed activity-log trends.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
