naftiko: 1.0.0-alpha2
info:
  label: SimpleLocalize API — Projects
  description: 'SimpleLocalize API — Projects. 2 operations. Lead operation: List Projects. Self-contained Naftiko capability
    covering one Simplelocalize business surface.'
  tags:
  - Simplelocalize
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIMPLELOCALIZE_API_KEY: SIMPLELOCALIZE_API_KEY
capability:
  consumes:
  - type: http
    namespace: simplelocalize-projects
    baseUri: https://api.simplelocalize.io
    description: SimpleLocalize API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-projects
      path: /api/v2/projects
      operations:
      - name: listprojects
        method: GET
        description: List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproject
        method: POST
        description: Create Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SIMPLELOCALIZE_API_KEY}}'
  exposes:
  - type: rest
    namespace: simplelocalize-projects-rest
    port: 8080
    description: REST adapter for SimpleLocalize API — Projects. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/projects
      name: api-v2-projects
      description: REST surface for api-v2-projects.
      operations:
      - method: GET
        name: listprojects
        description: List Projects
        call: simplelocalize-projects.listprojects
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: Create Project
        call: simplelocalize-projects.createproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: simplelocalize-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for SimpleLocalize API — Projects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-projects
      description: List Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: simplelocalize-projects.listprojects
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
      description: Create Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: simplelocalize-projects.createproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
