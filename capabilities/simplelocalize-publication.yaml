naftiko: 1.0.0-alpha2
info:
  label: SimpleLocalize API — Publication
  description: 'SimpleLocalize API — Publication. 1 operations. Lead operation: Publish Translations. Self-contained Naftiko
    capability covering one Simplelocalize business surface.'
  tags:
  - Simplelocalize
  - Publication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIMPLELOCALIZE_API_KEY: SIMPLELOCALIZE_API_KEY
capability:
  consumes:
  - type: http
    namespace: simplelocalize-publication
    baseUri: https://api.simplelocalize.io
    description: SimpleLocalize API — Publication business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-publish
      path: /api/v1/publish
      operations:
      - name: publishtranslations
        method: POST
        description: Publish Translations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.SIMPLELOCALIZE_API_KEY}}'
  exposes:
  - type: rest
    namespace: simplelocalize-publication-rest
    port: 8080
    description: REST adapter for SimpleLocalize API — Publication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/publish
      name: api-v1-publish
      description: REST surface for api-v1-publish.
      operations:
      - method: POST
        name: publishtranslations
        description: Publish Translations
        call: simplelocalize-publication.publishtranslations
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: simplelocalize-publication-mcp
    port: 9090
    transport: http
    description: MCP adapter for SimpleLocalize API — Publication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: publish-translations
      description: Publish Translations
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: simplelocalize-publication.publishtranslations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
