naftiko: 1.0.0-alpha2
info:
  label: SimpleLocalize Translation Management
  description: Unified translation management workflow for developers and localization teams. Combines translation CRUD, language
    management, project management, customer segmentation, and CDN publication into a single capability. Used by engineering
    teams to automate localization pipelines in CI/CD and by localization managers to manage multilingual content at scale.
  tags:
  - Localization
  - Translation
  - Internationalization
  - Content Management
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SIMPLELOCALIZE_API_KEY: SIMPLELOCALIZE_API_KEY
    SIMPLELOCALIZE_PERSONAL_TOKEN: SIMPLELOCALIZE_PERSONAL_TOKEN
capability:
  consumes:
  - type: http
    namespace: simplelocalize
    baseUri: https://api.simplelocalize.io
    description: SimpleLocalize translation management REST API
    authentication:
      type: apikey
      key: X-SimpleLocalize-Token
      value: '{{SIMPLELOCALIZE_API_KEY}}'
      placement: header
    resources:
    - name: translations
      path: /api/v2/translations
      description: Manage translation strings across languages and namespaces
      operations:
      - name: list-translations
        method: GET
        description: Retrieve translations with filtering and pagination
        inputParameters:
        - name: text
          in: query
          type: string
          required: false
          description: Search translated text using case-insensitive partial matching
        - name: textStatus
          in: query
          type: string
          required: false
          description: Filter by translation completeness (EMPTY, NOT_EMPTY)
        - name: reviewsStatus
          in: query
          type: string
          required: false
          description: Filter by review status (REVIEWED, NOT_REVIEWED)
        - name: key
          in: query
          type: string
          required: false
          description: Exact match filter for translation key
        - name: namespace
          in: query
          type: string
          required: false
          description: Exact match filter for translation namespace
        - name: language
          in: query
          type: string
          required: false
          description: Exact match filter for language identifier
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination page number
        - name: size
          in: query
          type: integer
          required: false
          description: Results per page (max 500)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: translations-v1
      path: /api/v1/translations
      description: Create or update translation strings
      operations:
      - name: create-or-update-translation
        method: POST
        description: Creates a new translation or updates an existing one
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            key: '{{tools.key}}'
            language: '{{tools.language}}'
            namespace: '{{tools.namespace}}'
            text: '{{tools.text}}'
    - name: languages
      path: /api/v1/languages
      description: Manage project languages
      operations:
      - name: list-languages
        method: GET
        description: Retrieves all languages configured in the project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-language
        method: POST
        description: Creates a new language in the project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            key: '{{tools.key}}'
            name: '{{tools.name}}'
    - name: language
      path: /api/v1/languages/{languageKey}
      description: Manage a specific language
      operations:
      - name: update-language
        method: PATCH
        description: Modifies an existing language's key or display name
        inputParameters:
        - name: languageKey
          in: path
          type: string
          required: true
          description: The language identifier to update
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            key: '{{tools.key}}'
            name: '{{tools.name}}'
      - name: delete-language
        method: DELETE
        description: Removes a language and all its translations from the project
        inputParameters:
        - name: languageKey
          in: path
          type: string
          required: true
          description: The language identifier to delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers
      path: /api/v1/customers
      description: Manage customer-specific translation segments
      operations:
      - name: list-customers
        method: GET
        description: Returns all available customers in the project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-customer
        method: POST
        description: Creates a new customer record for project-specific translations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            key: '{{tools.key}}'
            description: '{{tools.description}}'
    - name: customer
      path: /api/v1/customers/{customerKey}
      description: Manage a specific customer
      operations:
      - name: get-customer
        method: GET
        description: Retrieves details for a specific customer by their key
        inputParameters:
        - name: customerKey
          in: path
          type: string
          required: true
          description: The unique customer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-customer
        method: PATCH
        description: Modifies an existing customer's key or description
        inputParameters:
        - name: customerKey
          in: path
          type: string
          required: true
          description: The unique customer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            key: '{{tools.key}}'
            description: '{{tools.description}}'
      - name: delete-customer
        method: DELETE
        description: Removes a customer record from the project
        inputParameters:
        - name: customerKey
          in: path
          type: string
          required: true
          description: The unique customer identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: import
      path: /api/v1/import
      description: Import translation files in various formats
      operations:
      - name: import-translations
        method: POST
        description: Imports translation files in 30+ supported formats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: export
      path: /api/v1/export
      description: Export translation files in various formats
      operations:
      - name: export-translations
        method: GET
        description: Exports translation files in the requested format
        inputParameters:
        - name: downloadFormat
          in: query
          type: string
          required: true
          description: Target file format for export
        - name: languageKey
          in: query
          type: string
          required: false
          description: Export only the specified language
        - name: namespace
          in: query
          type: string
          required: false
          description: Export only the specified namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: publish
      path: /api/v1/publish
      description: Publish translations to CDN environments
      operations:
      - name: publish-translations
        method: POST
        description: Publishes translations to CDN environments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            environment: '{{tools.environment}}'
    - name: projects
      path: /api/v2/projects
      description: Manage translation projects
      operations:
      - name: list-projects
        method: GET
        description: Retrieves all existing projects with metadata and statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-project
        method: POST
        description: Creates a new translation project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
  exposes:
  - type: rest
    port: 8080
    namespace: translation-management-api
    description: Unified REST API for SimpleLocalize translation management workflows.
    resources:
    - path: /v1/translations
      name: translations
      description: Manage translation strings
      operations:
      - method: GET
        name: list-translations
        description: List translations with filtering by language, key, or namespace
        call: simplelocalize.list-translations
        with:
          language: rest.language
          key: rest.key
          namespace: rest.namespace
          text: rest.text
          textStatus: rest.textStatus
          reviewsStatus: rest.reviewsStatus
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-translation
        description: Create or update a translation string
        call: simplelocalize.create-or-update-translation
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/languages
      name: languages
      description: Manage project languages
      operations:
      - method: GET
        name: list-languages
        description: List all languages in the project
        call: simplelocalize.list-languages
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-language
        description: Add a new language to the project
        call: simplelocalize.create-language
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/languages/{languageKey}
      name: language
      description: Manage a specific language
      operations:
      - method: DELETE
        name: delete-language
        description: Remove a language and all its translations
        call: simplelocalize.delete-language
        with:
          languageKey: rest.languageKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects
      name: projects
      description: Manage translation projects
      operations:
      - method: GET
        name: list-projects
        description: List all translation projects
        call: simplelocalize.list-projects
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-project
        description: Create a new translation project
        call: simplelocalize.create-project
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers
      name: customers
      description: Manage customer translation segments
      operations:
      - method: GET
        name: list-customers
        description: List all customer segments
        call: simplelocalize.list-customers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-customer
        description: Create a new customer segment
        call: simplelocalize.create-customer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{customerKey}
      name: customer
      description: Manage a specific customer segment
      operations:
      - method: GET
        name: get-customer
        description: Retrieve a specific customer segment
        call: simplelocalize.get-customer
        with:
          customerKey: rest.customerKey
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-customer
        description: Remove a customer segment
        call: simplelocalize.delete-customer
        with:
          customerKey: rest.customerKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export
      name: export
      description: Export translations in various formats
      operations:
      - method: GET
        name: export-translations
        description: Export translations in the requested file format
        call: simplelocalize.export-translations
        with:
          downloadFormat: rest.downloadFormat
          languageKey: rest.languageKey
          namespace: rest.namespace
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/publish
      name: publish
      description: Publish translations to CDN
      operations:
      - method: POST
        name: publish-translations
        description: Publish translations to CDN environment
        call: simplelocalize.publish-translations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: translation-management-mcp
    transport: http
    description: MCP server for AI-assisted translation management and localization workflows.
    tools:
    - name: list-translations
      description: Retrieve translations with filtering by language, key, namespace, or text content
      hints:
        readOnly: true
        openWorld: true
      call: simplelocalize.list-translations
      with:
        language: tools.language
        key: tools.key
        namespace: tools.namespace
        text: tools.text
      outputParameters:
      - type: object
        mapping: $.
    - name: create-translation
      description: Create or update a translation string for a specific language and key
      hints:
        readOnly: false
        destructive: false
      call: simplelocalize.create-or-update-translation
      with:
        key: tools.key
        language: tools.language
        namespace: tools.namespace
        text: tools.text
      outputParameters:
      - type: object
        mapping: $.
    - name: list-languages
      description: List all languages configured in the translation project
      hints:
        readOnly: true
        openWorld: false
      call: simplelocalize.list-languages
      outputParameters:
      - type: object
        mapping: $.
    - name: create-language
      description: Add a new language to the translation project
      hints:
        readOnly: false
        destructive: false
      call: simplelocalize.create-language
      with:
        key: tools.key
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-language
      description: Remove a language and all associated translations from the project
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: simplelocalize.delete-language
      with:
        languageKey: tools.languageKey
      outputParameters:
      - type: object
        mapping: $.
    - name: list-projects
      description: List all translation projects in the account
      hints:
        readOnly: true
        openWorld: false
      call: simplelocalize.list-projects
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
      description: Create a new translation project
      hints:
        readOnly: false
        destructive: false
      call: simplelocalize.create-project
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: list-customers
      description: List all customer segments with their translation overrides
      hints:
        readOnly: true
        openWorld: false
      call: simplelocalize.list-customers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-customer
      description: Create a new customer segment for localized translation overrides
      hints:
        readOnly: false
        destructive: false
      call: simplelocalize.create-customer
      with:
        key: tools.key
        description: tools.description
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer
      description: Get details for a specific customer segment
      hints:
        readOnly: true
        openWorld: false
      call: simplelocalize.get-customer
      with:
        customerKey: tools.customerKey
      outputParameters:
      - type: object
        mapping: $.
    - name: export-translations
      description: Export translations in a specified file format (JSON, YAML, XLIFF, etc.)
      hints:
        readOnly: true
        openWorld: false
      call: simplelocalize.export-translations
      with:
        downloadFormat: tools.downloadFormat
        languageKey: tools.languageKey
        namespace: tools.namespace
      outputParameters:
      - type: object
        mapping: $.
    - name: publish-translations
      description: Publish translations to CDN environment for production use
      hints:
        readOnly: false
        destructive: false
      call: simplelocalize.publish-translations
      with:
        environment: tools.environment
      outputParameters:
      - type: object
        mapping: $.
