naftiko: "1.0.0-alpha1"

info:
  label: "SimpleLocalize API"
  description: >-
    SimpleLocalize is a translation management platform providing REST APIs
    for managing translations, languages, projects, and customer-specific
    translation segments. Supports 30+ file formats and CDN publication.
  tags:
    - Localization
    - Translation
    - Internationalization
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SIMPLELOCALIZE_API_KEY: SIMPLELOCALIZE_API_KEY
      SIMPLELOCALIZE_PERSONAL_TOKEN: SIMPLELOCALIZE_PERSONAL_TOKEN

capability:
  consumes:
    - type: http
      namespace: simplelocalize
      baseUri: https://api.simplelocalize.io
      description: "SimpleLocalize translation management REST API"
      authentication:
        type: apikey
        key: X-SimpleLocalize-Token
        value: "{{SIMPLELOCALIZE_API_KEY}}"
        placement: header
      resources:
        - name: translations
          path: /api/v2/translations
          description: Manage translation strings across languages and namespaces
          operations:
            - name: list-translations
              method: GET
              description: Retrieve translations with filtering and pagination
              inputParameters:
                - name: text
                  in: query
                  type: string
                  required: false
                  description: Search translated text using case-insensitive partial matching
                - name: textStatus
                  in: query
                  type: string
                  required: false
                  description: Filter by translation completeness (EMPTY, NOT_EMPTY)
                - name: reviewsStatus
                  in: query
                  type: string
                  required: false
                  description: Filter by review status (REVIEWED, NOT_REVIEWED)
                - name: key
                  in: query
                  type: string
                  required: false
                  description: Exact match filter for translation key
                - name: namespace
                  in: query
                  type: string
                  required: false
                  description: Exact match filter for translation namespace
                - name: language
                  in: query
                  type: string
                  required: false
                  description: Exact match filter for language identifier
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Pagination page number
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: Results per page (max 500)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: translations-v1
          path: /api/v1/translations
          description: Create or update translation strings
          operations:
            - name: create-or-update-translation
              method: POST
              description: Creates a new translation or updates an existing one
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{tools.key}}"
                  language: "{{tools.language}}"
                  namespace: "{{tools.namespace}}"
                  text: "{{tools.text}}"

        - name: languages
          path: /api/v1/languages
          description: Manage project languages
          operations:
            - name: list-languages
              method: GET
              description: Retrieves all languages configured in the project
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-language
              method: POST
              description: Creates a new language in the project
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{tools.key}}"
                  name: "{{tools.name}}"

        - name: language
          path: /api/v1/languages/{languageKey}
          description: Manage a specific language
          operations:
            - name: update-language
              method: PATCH
              description: Modifies an existing language's key or display name
              inputParameters:
                - name: languageKey
                  in: path
                  type: string
                  required: true
                  description: The language identifier to update
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{tools.key}}"
                  name: "{{tools.name}}"
            - name: delete-language
              method: DELETE
              description: Removes a language and all its translations from the project
              inputParameters:
                - name: languageKey
                  in: path
                  type: string
                  required: true
                  description: The language identifier to delete
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customers
          path: /api/v1/customers
          description: Manage customer-specific translation segments
          operations:
            - name: list-customers
              method: GET
              description: Returns all available customers in the project
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-customer
              method: POST
              description: Creates a new customer record for project-specific translations
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{tools.key}}"
                  description: "{{tools.description}}"

        - name: customer
          path: /api/v1/customers/{customerKey}
          description: Manage a specific customer
          operations:
            - name: get-customer
              method: GET
              description: Retrieves details for a specific customer by their key
              inputParameters:
                - name: customerKey
                  in: path
                  type: string
                  required: true
                  description: The unique customer identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-customer
              method: PATCH
              description: Modifies an existing customer's key or description
              inputParameters:
                - name: customerKey
                  in: path
                  type: string
                  required: true
                  description: The unique customer identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{tools.key}}"
                  description: "{{tools.description}}"
            - name: delete-customer
              method: DELETE
              description: Removes a customer record from the project
              inputParameters:
                - name: customerKey
                  in: path
                  type: string
                  required: true
                  description: The unique customer identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: import
          path: /api/v1/import
          description: Import translation files in various formats
          operations:
            - name: import-translations
              method: POST
              description: Imports translation files in 30+ supported formats
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: export
          path: /api/v1/export
          description: Export translation files in various formats
          operations:
            - name: export-translations
              method: GET
              description: Exports translation files in the requested format
              inputParameters:
                - name: downloadFormat
                  in: query
                  type: string
                  required: true
                  description: Target file format for export
                - name: languageKey
                  in: query
                  type: string
                  required: false
                  description: Export only the specified language
                - name: namespace
                  in: query
                  type: string
                  required: false
                  description: Export only the specified namespace
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: publish
          path: /api/v1/publish
          description: Publish translations to CDN environments
          operations:
            - name: publish-translations
              method: POST
              description: Publishes translations to CDN environments
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  environment: "{{tools.environment}}"

        - name: projects
          path: /api/v2/projects
          description: Manage translation projects
          operations:
            - name: list-projects
              method: GET
              description: Retrieves all existing projects with metadata and statistics
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-project
              method: POST
              description: Creates a new translation project
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

  exposes:
    - type: rest
      port: 8100
      namespace: simplelocalize-rest
      resources:
        - path: /v1/translations
          name: translations
          description: List and manage translations
          operations:
            - method: GET
              name: list-translations
              description: Retrieve translations with filtering
              call: "simplelocalize.list-translations"
              with:
                language: "rest.language"
                key: "rest.key"
                namespace: "rest.namespace"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-or-update-translation
              description: Create or update a translation
              call: "simplelocalize.create-or-update-translation"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/languages
          name: languages
          description: Manage project languages
          operations:
            - method: GET
              name: list-languages
              description: List all project languages
              call: "simplelocalize.list-languages"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-language
              description: Create a new language
              call: "simplelocalize.create-language"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects
          name: projects
          description: Manage translation projects
          operations:
            - method: GET
              name: list-projects
              description: List all translation projects
              call: "simplelocalize.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-project
              description: Create a new translation project
              call: "simplelocalize.create-project"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers
          name: customers
          description: Manage customer segments
          operations:
            - method: GET
              name: list-customers
              description: List all customers
              call: "simplelocalize.list-customers"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-customer
              description: Create a new customer
              call: "simplelocalize.create-customer"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/publish
          name: publish
          description: Publish translations to CDN
          operations:
            - method: POST
              name: publish-translations
              description: Publish translations to CDN environment
              call: "simplelocalize.publish-translations"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: simplelocalize-mcp
      transport: http
      tools:
        - name: list-translations
          description: Retrieve translations with filtering by language, key, namespace
          hints:
            readOnly: true
            openWorld: true
          call: "simplelocalize.list-translations"
          with:
            language: "tools.language"
            key: "tools.key"
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-translation
          description: Create or update a translation string
          hints:
            readOnly: false
            destructive: false
          call: "simplelocalize.create-or-update-translation"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-languages
          description: List all languages configured in the project
          hints:
            readOnly: true
            openWorld: false
          call: "simplelocalize.list-languages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-language
          description: Add a new language to the project
          hints:
            readOnly: false
            destructive: false
          call: "simplelocalize.create-language"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: List all translation projects
          hints:
            readOnly: true
            openWorld: false
          call: "simplelocalize.list-projects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-project
          description: Create a new translation project
          hints:
            readOnly: false
            destructive: false
          call: "simplelocalize.create-project"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-customers
          description: List all customer segments in the project
          hints:
            readOnly: true
            openWorld: false
          call: "simplelocalize.list-customers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: publish-translations
          description: Publish translations to CDN environment
          hints:
            readOnly: false
            destructive: false
          call: "simplelocalize.publish-translations"
          outputParameters:
            - type: object
              mapping: "$."
