specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SimpleLocalize
providerId: simplelocalize
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Localization
  - Translation
  - Internationalization
  - Rate Limiting
description: SimpleLocalize publishes plan-level capacity (translation keys, seats, auto-translation
  character pools) on its pricing page but does not document numeric request-per-second/minute API
  rate limits or rate-limit response headers in publicly reachable documentation. Plan caps belong in
  the plans artifact; this artifact is left as a low-confidence stub until SimpleLocalize publishes
  per-key request limits.
sources:
  - https://simplelocalize.io/pricing/
  - https://simplelocalize.io/docs/
notes: |
  Provider's developer documentation surface (developer.simplelocalize.io) was not reachable at
  reconciliation time and SimpleLocalize's pricing page does not enumerate numeric API rate limits.
  Confirm via the official API reference before treating limits below as authoritative.
responseCodes:
  throttled: 429
limits:
  - name: Per-Account Request Throttling
    scope: account
    metric: varies
    limit: 'see SimpleLocalize API documentation'
    notes: Numeric per-second / per-minute request limits are not published on the pricing page.
  - name: Translation Keys (Plan Cap)
    scope: account
    metric: varies
    limit: 'plan-dependent (250 / 1,000 / 4,000 / 12,000)'
    notes: Plan-tier caps; tracked authoritatively in plans/simplelocalize-plans-pricing.yml.
  - name: Auto-Translation Character Pool
    scope: account
    metric: varies
    limit: 'plan-dependent monthly top-up with rollover ceiling'
    notes: Soft consumption cap on machine-translation characters; plan tier sets the ceiling.
policies:
  - name: Plan-Tier Quotas
    description: Capacity limits (translation keys, seats, languages, auto-translation characters)
      are enforced at plan level and published on the pricing page.
  - name: Backoff
    description: When request-rate throttling does occur, clients should implement exponential backoff
      with jitter and honor any Retry-After header the API returns.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
