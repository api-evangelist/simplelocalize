specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SimpleLocalize
providerId: simplelocalize
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Localization
  - Translation
  - Internationalization
  - Translation Management
description: SimpleLocalize uses tiered subscription pricing with monthly recurring fees in EUR. Plans
  are differentiated primarily by translation key counts, team-member seats, project/language counts,
  and an auto-translation character allowance (initial pool plus monthly top-up with a rollover ceiling).
  All plans include unlimited strings. Annual billing is offered. Custom enterprise plans are negotiated
  via contact@simplelocalize.io.
sources:
  - https://simplelocalize.io/pricing/
plans:
  - id: simplelocalize-community
    name: Community
    type: freemium
    description: Free entry tier capped at 250 translation keys, 10 projects, 10 languages, and a single
      team member, with a 30-day activity log. Intended for solo evaluation and small open projects.
    entries:
      - label: Translation Keys
        name: translation_keys
        type: quota
        metric: keys
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Projects
        name: projects
        type: quota
        metric: projects
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Languages
        name: languages
        type: quota
        metric: languages
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Team Members
        name: team_members
        type: quota
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Auto-Translation Characters (Initial)
        name: auto_translation_initial
        type: quota
        metric: characters
        limit: 150000
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Auto-Translation Characters (Monthly)
        name: auto_translation_monthly
        type: quota
        metric: characters
        limit: 50000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Unlimited Strings
      - name: 30-Day Activity Log
      - name: Up to 25 Customer Translations
      - name: Community Support
  - id: simplelocalize-developer
    name: Developer
    type: subscription
    description: Entry paid plan at EUR 12.00/month with 1,000 translation keys, unlimited projects and
      languages, 5 team members, and a 90-day activity log.
    entries:
      - label: Subscription Fee
        name: subscription_fee
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: 'EUR 12.00'
        userMultiplied: false
      - label: Translation Keys
        name: translation_keys
        type: quota
        metric: keys
        limit: 1000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Team Members
        name: team_members
        type: quota
        metric: seat
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Auto-Translation Characters (Initial)
        name: auto_translation_initial
        type: quota
        metric: characters
        limit: 300000
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Auto-Translation Characters (Monthly)
        name: auto_translation_monthly
        type: quota
        metric: characters
        limit: 100000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
